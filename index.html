<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Equation Balance - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Prevent default touch behaviors like scrolling while dragging on iPad */
        body {
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        .balance-beam {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center 20px;
        }

        .item-box {
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 14px;
            font-size: 16px;
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
            touch-action: none; /* Critical for custom touch dragging */
        }

        .item-box:active { cursor: grabbing; transform: scale(1.1); }
        
        .x-pos { background-color: #f97316; color: white; border: 2px solid #ea580c; }
        .num-pos { background-color: #3b82f6; color: white; border: 2px solid #2563eb; }
        .is-negative { border-style: dashed !important; opacity: 0.9; }
        .x-neg { background-color: #ef4444; color: white; border: 2px solid #dc2626; }
        .num-neg { background-color: #06b6d4; color: white; border: 2px solid #0891b2; }
        
        .item-input {
            background: transparent;
            width: 100%;
            text-align: center;
            color: inherit;
            font-weight: 800;
            outline: none;
            font-size: 1.1rem;
        }

        .drop-zone {
            min-height: 240px;
            border: 3px dashed transparent;
            transition: border-color 0.3s, background-color 0.3s;
            border-radius: 1.5rem;
        }

        .drop-zone.drag-over {
            border-color: #94a3b8;
            background-color: rgba(226, 232, 240, 0.5);
        }

        .dragging-active {
            opacity: 0.5;
            transform: scale(0.9);
            pointer-events: none;
        }

        /* Ghost element for touch dragging */
        #drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            display: none;
            opacity: 0.8;
        }

        .toolbar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 1rem;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-4 md:p-8 text-slate-800" 
      ondragover="allowDrop(event)" ondrop="handleGlobalDrop(event)">

    <!-- Ghost element for mobile dragging visualization -->
    <div id="drag-ghost" class="item-box"></div>

    <header class="max-w-4xl w-full text-center mb-6">
        <h1 class="text-3xl md:text-4xl font-black text-slate-900 mb-1">⚖️ Equation Balance Master</h1>
        <p class="text-slate-500 font-medium italic text-sm md:text-base">Heavier value side sinks to the bottom. Drag items to the plates.</p>
    </header>

    <!-- Toolbar: Responsive for Mobile/iPad -->
    <nav class="bg-white p-4 md:p-6 rounded-3xl shadow-xl flex flex-wrap justify-center items-center mb-8 border-2 border-slate-100 z-50 gap-y-4">
        <div class="toolbar-section border-r border-slate-100">
            <span class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Variables (X)</span>
            <div class="flex gap-3">
                <div class="item-box x-pos touch-draggable" data-type="x" data-val-id="toolXPosVal">
                     <input type="text" id="toolXPosVal" value="1" class="item-input" readonly>
                </div>
                <div class="item-box x-neg is-negative touch-draggable" data-type="x" data-val-id="toolXNegVal">
                     <input type="text" id="toolXNegVal" value="-1" class="item-input" readonly>
                </div>
            </div>
        </div>

        <div class="toolbar-section border-r border-slate-100">
            <span class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Constants</span>
            <div class="flex gap-3">
                <div class="item-box num-pos touch-draggable" data-type="num" data-val-id="toolNumPosVal">
                    <input type="text" id="toolNumPosVal" value="1" class="item-input" readonly>
                </div>
                <div class="item-box num-neg is-negative touch-draggable" data-type="num" data-val-id="toolNumNegVal">
                    <input type="text" id="toolNumNegVal" value="-1" class="item-input" readonly>
                </div>
            </div>
        </div>

        <div class="toolbar-section border-r border-slate-100">
            <label for="valX" class="text-[10px] font-bold text-orange-600 mb-1 uppercase tracking-widest">Set X Value</label>
            <input type="number" id="valX" value="5" class="border-2 border-orange-100 rounded-xl p-2 text-center text-xl font-black bg-orange-50 w-20 outline-none focus:border-orange-400">
        </div>

        <div class="toolbar-section gap-2">
            <button onclick="combineTerms()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl transition-colors font-bold text-sm shadow-md w-full">✨ Combine</button>
            <button onclick="resetScale()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-6 py-2 rounded-xl transition-colors font-bold text-sm w-full">🔄 Reset</button>
        </div>
    </nav>

    <!-- Equation Visualization -->
    <section aria-label="Equation Display" class="bg-white px-8 py-4 md:px-12 md:py-6 rounded-2xl mb-10 shadow-sm border-2 border-slate-100 flex flex-col items-center w-full max-w-2xl">
        <div class="flex items-center justify-between w-full gap-4">
            <div class="flex flex-col items-center flex-1">
                <span id="txtLeft" class="text-2xl md:text-4xl font-serif font-medium text-slate-700">0</span>
                <div class="mt-2 w-full border-t border-slate-100 pt-2 flex items-center justify-center gap-1 text-slate-400 font-bold text-lg">
                    <span>=</span>
                    <span id="evalLeft" class="text-slate-900 font-black">0</span>
                </div>
            </div>

            <div class="flex flex-col items-center gap-1 px-4 border-x border-slate-100">
                <span class="text-3xl text-slate-200">=</span>
                <span id="xDisplayCenter" class="text-[10px] font-black text-orange-500 bg-orange-50 px-3 py-1 rounded-full border border-orange-100 uppercase whitespace-nowrap">X = 5</span>
            </div>

            <div class="flex flex-col items-center flex-1">
                <span id="txtRight" class="text-2xl md:text-4xl font-serif font-medium text-slate-700">0</span>
                <div class="mt-2 w-full border-t border-slate-100 pt-2 flex items-center justify-center gap-1 text-slate-400 font-bold text-lg">
                    <span>=</span>
                    <span id="evalRight" class="text-slate-900 font-black">0</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Scale -->
    <div class="relative w-full max-w-6xl flex flex-col items-center mt-12 mb-20">
        <div class="absolute top-[20px] w-4 md:w-6 h-[300px] md:h-[420px] bg-slate-200 rounded-full"></div>
        <div class="absolute top-[10px] w-12 h-12 md:w-14 md:h-14 bg-slate-400 rounded-full z-20 border-4 border-white shadow-md"></div>
        
        <div id="beam" class="balance-beam relative w-full flex justify-between items-start pt-10 z-10 px-4 md:px-10">
            <!-- Left Plate -->
            <div id="leftContainer" class="flex flex-col items-center w-[45%] md:w-[480px]">
                <div id="leftPlate" class="drop-zone w-full flex flex-wrap-reverse justify-center gap-2 p-4 content-start"
                     ondragover="allowDrop(event)" ondrop="handlePlateDrop(event, 'left')">
                </div>
                <div class="w-full h-5 md:h-7 bg-slate-800 rounded-full shadow-2xl relative">
                    <div id="tagLeft" class="weight-tag absolute -top-10 left-1/2 -translate-x-1/2 bg-orange-600 text-white text-[10px] font-bold px-3 py-1 rounded-full opacity-0 uppercase">Heavier ↓</div>
                </div>
                <div class="mt-4 bg-slate-700 text-white px-4 py-2 rounded-full text-[10px] font-black tracking-widest uppercase">
                    Val: <span id="sumLeft" class="text-base ml-1">0</span>
                </div>
            </div>

            <!-- Right Plate -->
            <div id="rightContainer" class="flex flex-col items-center w-[45%] md:w-[480px]">
                <div id="rightPlate" class="drop-zone w-full flex flex-wrap-reverse justify-center gap-2 p-4 content-start"
                     ondragover="allowDrop(event)" ondrop="handlePlateDrop(event, 'right')">
                </div>
                <div class="w-full h-5 md:h-7 bg-slate-800 rounded-full shadow-2xl relative">
                    <div id="tagRight" class="weight-tag absolute -top-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] font-bold px-3 py-1 rounded-full opacity-0 uppercase">Heavier ↓</div>
                </div>
                <div class="mt-4 bg-slate-700 text-white px-4 py-2 rounded-full text-[10px] font-black tracking-widest uppercase">
                    Val: <span id="sumRight" class="text-base ml-1">0</span>
                </div>
            </div>
        </div>
    </div>

    <div id="status" class="mt-12 text-2xl md:text-4xl font-black h-16 text-center transition-all duration-300"></div>

    <script>
        let state = {
            left: [{type: 'x', value: 2}, {type: 'num', value: 4}],
            right: [{type: 'num', value: 14}],
            xValue: 5
        };

        // Mobile Drag State
        let touchDrag = {
            active: false,
            type: null,
            value: null,
            index: null,
            fromSide: null,
            fromSource: false,
            targetEl: null
        };

        const beam = document.getElementById('beam');
        const statusEl = document.getElementById('status');
        const valXInput = document.getElementById('valX');
        const ghost = document.getElementById('drag-ghost');

        // --- Drag and Drop Logic (Standard Mouse) ---
        function handleSourceDragStart(e, type, defaultVal) {
            const inputId = type === 'x' ? (defaultVal > 0 ? 'toolXPosVal' : 'toolXNegVal') : (defaultVal > 0 ? 'toolNumPosVal' : 'toolNumNegVal');
            const val = parseFloat(document.getElementById(inputId).value) || defaultVal;
            e.dataTransfer.setData('type', type);
            e.dataTransfer.setData('value', val);
            e.dataTransfer.setData('fromSource', 'true');
        }

        function handleDragStart(e, type, value, index, fromSide) {
            e.dataTransfer.setData('type', type);
            e.dataTransfer.setData('value', value);
            e.dataTransfer.setData('index', index);
            e.dataTransfer.setData('fromSide', fromSide);
        }

        function allowDrop(e) { e.preventDefault(); }

        function handlePlateDrop(e, toSide) {
            e.stopPropagation();
            e.preventDefault();
            const type = e.dataTransfer.getData('type');
            const val = parseFloat(e.dataTransfer.getData('value'));
            const fromIndex = e.dataTransfer.getData('index');
            const fromSide = e.dataTransfer.getData('fromSide');
            const fromSource = e.dataTransfer.getData('fromSource');

            processDrop(type, val, fromIndex, fromSide, toSide, fromSource === 'true');
        }

        function handleGlobalDrop(e) {
            e.preventDefault();
            const fromIndex = e.dataTransfer.getData('index');
            const fromSide = e.dataTransfer.getData('fromSide');
            if (fromSide) {
                state[fromSide].splice(fromIndex, 1);
                render();
            }
        }

        // --- Touch Interaction Logic (iPad) ---
        function initTouchEvents() {
            document.addEventListener('touchstart', (e) => {
                const target = e.target.closest('.item-box');
                if (!target) return;

                // Disable default scrolling
                if (target.draggable || target.classList.contains('touch-draggable')) {
                    const type = target.dataset.type || (target.querySelector('.item-input')?.value.toLowerCase().includes('x') ? 'x' : 'num');
                    const valId = target.dataset.valId;
                    let val;
                    
                    if (valId) {
                        val = parseFloat(document.getElementById(valId).value);
                        touchDrag.fromSource = true;
                    } else {
                        val = parseFloat(target.dataset.value);
                        touchDrag.index = parseInt(target.dataset.index);
                        touchDrag.fromSide = target.dataset.fromSide;
                        touchDrag.fromSource = false;
                    }

                    touchDrag.active = true;
                    touchDrag.type = type;
                    touchDrag.value = val;
                    touchDrag.targetEl = target;

                    // Setup ghost
                    ghost.className = target.className;
                    ghost.innerHTML = target.innerHTML;
                    ghost.style.display = 'flex';
                    updateGhostPosition(e.touches[0]);
                }
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (!touchDrag.active) return;
                e.preventDefault(); // Prevent scroll
                updateGhostPosition(e.touches[0]);

                // Highlight drop zones
                const touch = e.touches[0];
                const elementUnder = document.elementFromPoint(touch.clientX, touch.clientY);
                const zone = elementUnder?.closest('.drop-zone');
                
                document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
                if (zone) zone.classList.add('drag-over');
            }, { passive: false });

            document.addEventListener('touchend', (e) => {
                if (!touchDrag.active) return;
                
                const touch = e.changedTouches[0];
                const elementUnder = document.elementFromPoint(touch.clientX, touch.clientY);
                const zone = elementUnder?.closest('.drop-zone');
                
                if (zone) {
                    const toSide = zone.id === 'leftPlate' ? 'left' : 'right';
                    processDrop(touchDrag.type, touchDrag.value, touchDrag.index, touchDrag.fromSide, toSide, touchDrag.fromSource);
                } else if (touchDrag.fromSide) {
                    // Drop outside to delete
                    state[touchDrag.fromSide].splice(touchDrag.index, 1);
                    render();
                }

                // Reset
                touchDrag.active = false;
                ghost.style.display = 'none';
                document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
            });
        }

        function updateGhostPosition(touch) {
            ghost.style.left = (touch.clientX - 32) + 'px';
            ghost.style.top = (touch.clientY - 32) + 'px';
        }

        function processDrop(type, val, fromIndex, fromSide, toSide, isSource) {
            if (fromSide && fromSide !== toSide) {
                state[fromSide].splice(fromIndex, 1);
                state[toSide].push({type, value: val});
            } else if (isSource) {
                state[toSide].push({type, value: val});
            }
            render();
        }

        // --- Core Application Logic ---
        function combineTerms() {
            ['left', 'right'].forEach(side => {
                let xSum = 0, numSum = 0;
                state[side].forEach(item => item.type === 'x' ? xSum += item.value : numSum += item.value);
                state[side] = [];
                if (xSum !== 0) state[side].push({type: 'x', value: xSum});
                if (numSum !== 0) state[side].push({type: 'num', value: numSum});
            });
            render();
        }

        function smartFormat(num) {
            return Number.isInteger(num) ? num.toString() : num.toFixed(2).replace(/\.?0+$/, "");
        }

        function render() {
            state.xValue = parseFloat(valXInput.value) || 0;
            renderSide('left', document.getElementById('leftPlate'));
            renderSide('right', document.getElementById('rightPlate'));

            const leftVal = calculateWeight(state.left);
            const rightVal = calculateWeight(state.right);

            document.getElementById('sumLeft').innerText = smartFormat(leftVal);
            document.getElementById('sumRight').innerText = smartFormat(rightVal);
            document.getElementById('txtLeft').innerText = formatEquation(state.left);
            document.getElementById('txtRight').innerText = formatEquation(state.right);
            document.getElementById('evalLeft').innerText = smartFormat(leftVal);
            document.getElementById('evalRight').innerText = smartFormat(rightVal);
            document.getElementById('xDisplayCenter').innerText = `X = ${smartFormat(state.xValue)}`;

            const diff = leftVal - rightVal;
            let rot = -diff * 4; 
            rot = Math.max(-25, Math.min(25, rot));

            beam.style.transform = `rotate(${rot}deg)`;
            document.getElementById('leftContainer').style.transform = `rotate(${-rot}deg)`;
            document.getElementById('rightContainer').style.transform = `rotate(${-rot}deg)`;

            document.getElementById('tagLeft').style.opacity = leftVal > rightVal ? '1' : '0';
            document.getElementById('tagRight').style.opacity = rightVal > leftVal ? '1' : '0';

            if (Math.abs(leftVal - rightVal) < 0.001 && (state.left.length > 0 || state.right.length > 0)) {
                statusEl.innerText = "🌟 PERFECT BALANCE 🌟";
                statusEl.className = "mt-12 text-2xl md:text-5xl font-black text-emerald-500 animate-bounce";
            } else {
                statusEl.innerText = leftVal > rightVal ? "LEFT SIDE IS HEAVIER ↓" : (leftVal < rightVal ? "RIGHT SIDE IS HEAVIER ↓" : "");
                statusEl.className = `mt-12 text-xl md:text-2xl font-black ${leftVal > rightVal ? 'text-orange-600' : 'text-blue-600'}`;
            }
        }

        function renderSide(side, container) {
            container.innerHTML = '';
            state[side].forEach((item, index) => {
                const el = document.createElement('div');
                const isNeg = item.value < 0;
                let typeClass = item.type === 'x' ? (isNeg ? 'x-neg' : 'x-pos') : (isNeg ? 'num-neg' : 'num-pos');
                
                el.className = `item-box ${typeClass} ${isNeg ? 'is-negative' : ''}`;
                el.draggable = true;
                el.dataset.type = item.type;
                el.dataset.value = item.value;
                el.dataset.index = index;
                el.dataset.fromSide = side;

                el.addEventListener('dragstart', (e) => handleDragStart(e, item.type, item.value, index, side));
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'item-input';
                input.readOnly = true; // Use buttons or secondary modal for editing on iPad to avoid keyboard flicker
                
                if (item.type === 'x') {
                    if (item.value === 1) input.value = 'X';
                    else if (item.value === -1) input.value = '-X';
                    else input.value = smartFormat(item.value) + 'x';
                } else input.value = smartFormat(item.value);
                
                el.appendChild(input);
                container.appendChild(el);
            });
        }

        function calculateWeight(arr) { 
            return arr.reduce((acc, i) => acc + (i.type === 'x' ? i.value * state.xValue : i.value), 0); 
        }

        function formatEquation(arr) {
            if (arr.length === 0) return '0';
            let xT = 0, nT = 0;
            arr.forEach(i => i.type === 'x' ? xT += i.value : nT += i.value);
            let parts = [];
            if (xT !== 0) {
                if (xT === 1) parts.push('x');
                else if (xT === -1) parts.push('-x');
                else parts.push(smartFormat(xT) + 'x');
            }
            if (nT !== 0) {
                if (parts.length > 0) {
                    parts.push(nT > 0 ? '+ ' + smartFormat(nT) : '- ' + smartFormat(Math.abs(nT)));
                } else {
                    parts.push(smartFormat(nT));
                }
            }
            return parts.length > 0 ? parts.join(' ') : '0';
        }

        function resetScale() { state.left = []; state.right = []; render(); }
        
        valXInput.oninput = render;
        
        // Final Init
        initTouchEvents();
        render();
    </script>
</body>
</html>
