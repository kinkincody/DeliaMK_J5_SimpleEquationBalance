<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Equation Balance - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .balance-beam {
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center 20px;
        }
        .item-box {
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 12px;
            font-size: 14px;
            cursor: grab;
            user-select: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            position: relative;
        }
        .item-box:active { cursor: grabbing; transform: scale(1.05); }
        
        /* Positive Styles */
        .x-pos { background-color: #f97316; color: white; border: 2px solid #ea580c; }
        .num-pos { background-color: #3b82f6; color: white; border: 2px solid #2563eb; }
        
        /* Negative Styles */
        .is-negative {
            border-style: dashed !important;
            opacity: 0.9;
        }
        .x-neg { background-color: #ef4444; color: white; border: 2px solid #dc2626; }
        .num-neg { background-color: #06b6d4; color: white; border: 2px solid #0891b2; }
        
        .item-input {
            background: transparent;
            width: 100%;
            text-align: center;
            color: inherit;
            font-weight: 800;
            outline: none;
            cursor: text;
            font-size: 1rem;
        }

        .drop-zone {
            min-height: 220px;
            border: 2px dashed transparent;
            transition: border-color 0.3s, background-color 0.3s;
            border-radius: 1.5rem;
        }
        .drop-zone.drag-over {
            border-color: #cbd5e1;
            background-color: rgba(241, 245, 249, 0.8);
        }

        .balanced-glow {
            filter: drop-shadow(0 0 30px rgba(34, 197, 94, 0.5));
        }

        .toolbar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 1.5rem;
        }

        .weight-tag {
            transition: opacity 0.3s;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center p-6 text-slate-800" ondragover="allowDrop(event)" ondrop="handleGlobalDrop(event)">

    <div class="max-w-4xl w-full text-center mb-6">
        <h1 class="text-4xl font-black text-slate-900 mb-1">⚖️ Equation Balance Master</h1>
        <p class="text-slate-500 font-medium italic">Heavier value side sinks to the bottom.</p>
    </div>

    <!-- Toolbar -->
    <div class="bg-white p-5 rounded-3xl shadow-xl flex items-center mb-8 border-2 border-slate-100 z-50 divide-x divide-slate-100">
        <div class="toolbar-section">
            <span class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Variables (X)</span>
            <div class="flex gap-4">
                <div class="item-box x-pos" draggable="true" ondragstart="handleSourceDragStart(event, 'x', 1)">
                     <input type="text" id="toolXPosVal" value="1" class="item-input" onmousedown="event.stopPropagation()">
                </div>
                <div class="item-box x-neg is-negative" draggable="true" ondragstart="handleSourceDragStart(event, 'x', -1)">
                     <input type="text" id="toolXNegVal" value="-1" class="item-input" onmousedown="event.stopPropagation()">
                </div>
            </div>
        </div>

        <div class="toolbar-section">
            <span class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Constants</span>
            <div class="flex gap-4">
                <div class="item-box num-pos" draggable="true" ondragstart="handleSourceDragStart(event, 'num', 1)">
                    <input type="text" id="toolNumPosVal" value="1" class="item-input" onmousedown="event.stopPropagation()">
                </div>
                <div class="item-box num-neg is-negative" draggable="true" ondragstart="handleSourceDragStart(event, 'num', -1)">
                    <input type="text" id="toolNumNegVal" value="-1" class="item-input" onmousedown="event.stopPropagation()">
                </div>
            </div>
        </div>

        <div class="toolbar-section">
            <label class="text-[10px] font-bold text-orange-600 mb-1 uppercase tracking-widest">Set X Value</label>
            <input type="number" id="valX" value="5" class="border-2 border-orange-100 rounded-xl p-2 text-center text-xl font-black bg-orange-50 w-20 outline-none focus:border-orange-400">
        </div>

        <div class="toolbar-section gap-2">
            <button onclick="combineTerms()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl transition-colors font-bold text-xs shadow-md w-full">✨ Combine</button>
            <button onclick="resetScale()" class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-xl transition-colors font-bold text-xs w-full">🔄 Reset</button>
        </div>
    </div>

    <!-- Equation Visualization -->
    <div class="bg-white px-12 py-6 rounded-2xl mb-10 shadow-sm border-2 border-slate-100 flex flex-col items-center">
        <div class="flex items-center gap-8">
            <div class="flex flex-col items-center min-w-[140px]">
                <span id="txtLeft" class="text-4xl font-serif font-medium text-slate-700">0</span>
                <div class="mt-3 w-full border-t border-slate-100 pt-2 flex items-center justify-center gap-1 text-slate-400 font-bold text-lg">
                    <span>=</span>
                    <span id="evalLeft" class="text-slate-900 font-black">0</span>
                </div>
            </div>

            <div class="flex flex-col items-center gap-2 px-4 border-x border-slate-100">
                <span class="text-4xl text-slate-200">=</span>
                <span id="xDisplayCenter" class="text-xs font-black text-orange-500 bg-orange-50 px-3 py-1 rounded-full border border-orange-100 uppercase tracking-tighter">X = 5</span>
            </div>

            <div class="flex flex-col items-center min-w-[140px]">
                <span id="txtRight" class="text-4xl font-serif font-medium text-slate-700">0</span>
                <div class="mt-3 w-full border-t border-slate-100 pt-2 flex items-center justify-center gap-1 text-slate-400 font-bold text-lg">
                    <span>=</span>
                    <span id="evalRight" class="text-slate-900 font-black">0</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Scale -->
    <div class="relative w-full max-w-6xl flex flex-col items-center">
        <div class="absolute top-[20px] w-6 h-[420px] bg-slate-200 rounded-full"></div>
        <div class="absolute top-[10px] w-14 h-14 bg-slate-400 rounded-full z-20 border-4 border-white shadow-md"></div>
        
        <div id="beam" class="balance-beam relative w-full flex justify-between items-start pt-10 z-10 px-10">
            <!-- Left Plate -->
            <div id="leftContainer" class="flex flex-col items-center w-[480px]">
                <div id="leftPlate" class="drop-zone w-full flex flex-wrap-reverse justify-center gap-3 p-6 content-start"
                     ondragover="allowDrop(event)" ondrop="handlePlateDrop(event, 'left')">
                </div>
                <div class="w-full h-7 bg-slate-800 rounded-full shadow-2xl relative">
                    <div id="tagLeft" class="weight-tag absolute -top-8 left-1/2 -translate-x-1/2 bg-orange-600 text-white text-[10px] font-bold px-2 py-0.5 rounded opacity-0 uppercase tracking-widest">Heavier ↓</div>
                </div>
                <div class="mt-5 bg-slate-700 text-white px-6 py-2 rounded-full text-xs font-black tracking-widest uppercase">
                    Value: <span id="sumLeft" class="text-lg ml-1">0</span>
                </div>
            </div>

            <!-- Right Plate -->
            <div id="rightContainer" class="flex flex-col items-center w-[480px]">
                <div id="rightPlate" class="drop-zone w-full flex flex-wrap-reverse justify-center gap-3 p-6 content-start"
                     ondragover="allowDrop(event)" ondrop="handlePlateDrop(event, 'right')">
                </div>
                <div class="w-full h-7 bg-slate-800 rounded-full shadow-2xl relative">
                    <div id="tagRight" class="weight-tag absolute -top-8 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded opacity-0 uppercase tracking-widest">Heavier ↓</div>
                </div>
                <div class="mt-5 bg-slate-700 text-white px-6 py-2 rounded-full text-xs font-black tracking-widest uppercase">
                    Value: <span id="sumRight" class="text-lg ml-1">0</span>
                </div>
            </div>
        </div>
    </div>

    <div id="status" class="mt-36 text-4xl font-black h-16 transition-all duration-300"></div>

    <script>
        let state = {
            left: [{type: 'x', value: 2}, {type: 'num', value: 4}],
            right: [{type: 'num', value: 14}],
            xValue: 5
        };

        const beam = document.getElementById('beam');
        const statusEl = document.getElementById('status');
        const valXInput = document.getElementById('valX');

        function handleSourceDragStart(e, type, defaultVal) {
            e.dataTransfer.setData('type', type);
            let inputId = type === 'x' ? (defaultVal > 0 ? 'toolXPosVal' : 'toolXNegVal') : (defaultVal > 0 ? 'toolNumPosVal' : 'toolNumNegVal');
            const val = parseFloat(document.getElementById(inputId).value) || defaultVal;
            e.dataTransfer.setData('value', val);
            e.dataTransfer.setData('fromSource', 'true');
        }

        function handleDragStart(e, type, value, index, fromSide) {
            e.dataTransfer.setData('type', type);
            e.dataTransfer.setData('value', value);
            e.dataTransfer.setData('index', index);
            e.dataTransfer.setData('fromSide', fromSide);
        }

        function allowDrop(e) { e.preventDefault(); }

        function handlePlateDrop(e, toSide) {
            e.stopPropagation();
            e.preventDefault();
            const type = e.dataTransfer.getData('type');
            const val = parseFloat(e.dataTransfer.getData('value'));
            const fromIndex = e.dataTransfer.getData('index');
            const fromSide = e.dataTransfer.getData('fromSide');
            const fromSource = e.dataTransfer.getData('fromSource');

            if (fromSide && fromSide !== toSide) {
                state[fromSide].splice(fromIndex, 1);
                state[toSide].push({type, value: val});
            } else if (fromSource === 'true') {
                state[toSide].push({type, value: val});
            }
            render();
        }

        function handleGlobalDrop(e) {
            e.preventDefault();
            const fromIndex = e.dataTransfer.getData('index');
            const fromSide = e.dataTransfer.getData('fromSide');
            if (fromSide) {
                state[fromSide].splice(fromIndex, 1);
                render();
            }
        }

        function combineTerms() {
            ['left', 'right'].forEach(side => {
                let xSum = 0, numSum = 0;
                state[side].forEach(item => item.type === 'x' ? xSum += item.value : numSum += item.value);
                state[side] = [];
                if (xSum !== 0) state[side].push({type: 'x', value: xSum});
                if (numSum !== 0) state[side].push({type: 'num', value: numSum});
            });
            render();
        }

        function smartFormat(num) {
            // Returns a string. If it's an integer, no decimal places.
            return Number.isInteger(num) ? num.toString() : num.toFixed(2).replace(/\.?0+$/, "");
        }

        function render() {
            state.xValue = parseFloat(valXInput.value) || 0;
            renderSide('left', document.getElementById('leftPlate'));
            renderSide('right', document.getElementById('rightPlate'));

            const leftVal = calculateWeight(state.left);
            const rightVal = calculateWeight(state.right);

            document.getElementById('sumLeft').innerText = smartFormat(leftVal);
            document.getElementById('sumRight').innerText = smartFormat(rightVal);
            document.getElementById('txtLeft').innerText = formatEquation(state.left);
            document.getElementById('txtRight').innerText = formatEquation(state.right);
            document.getElementById('evalLeft').innerText = smartFormat(leftVal);
            document.getElementById('evalRight').innerText = smartFormat(rightVal);
            document.getElementById('xDisplayCenter').innerText = `X = ${smartFormat(state.xValue)}`;

            const diff = leftVal - rightVal;
            let rot = -diff * 5; 
            rot = Math.max(-25, Math.min(25, rot));

            beam.style.transform = `rotate(${rot}deg)`;
            document.getElementById('leftContainer').style.transform = `rotate(${-rot}deg)`;
            document.getElementById('rightContainer').style.transform = `rotate(${-rot}deg)`;

            document.getElementById('tagLeft').style.opacity = leftVal > rightVal ? '1' : '0';
            document.getElementById('tagRight').style.opacity = rightVal > leftVal ? '1' : '0';

            if (Math.abs(leftVal - rightVal) < 0.001 && (state.left.length > 0 || state.right.length > 0)) {
                statusEl.innerText = "🌟 PERFECT BALANCE 🌟";
                statusEl.className = "mt-36 text-5xl font-black text-emerald-500 animate-bounce";
                beam.classList.add('balanced-glow');
            } else {
                statusEl.innerText = leftVal > rightVal ? "LEFT SIDE IS HEAVIER ↓" : (leftVal < rightVal ? "RIGHT SIDE IS HEAVIER ↓" : "");
                statusEl.className = `mt-36 text-2xl font-black ${leftVal > rightVal ? 'text-orange-600' : 'text-blue-600'}`;
                beam.classList.remove('balanced-glow');
            }
        }

        function renderSide(side, container) {
            container.innerHTML = '';
            state[side].forEach((item, index) => {
                const el = document.createElement('div');
                const isNeg = item.value < 0;
                let typeClass = item.type === 'x' ? (isNeg ? 'x-neg' : 'x-pos') : (isNeg ? 'num-neg' : 'num-pos');
                el.className = `item-box ${typeClass} ${isNeg ? 'is-negative' : ''}`;
                el.draggable = true;
                el.addEventListener('dragstart', (e) => handleDragStart(e, item.type, item.value, index, side));
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'item-input';
                if (item.type === 'x') {
                    if (item.value === 1) input.value = 'X';
                    else if (item.value === -1) input.value = '-X';
                    else input.value = smartFormat(item.value) + 'x';
                } else input.value = smartFormat(item.value);
                
                input.onchange = (e) => {
                    let clean = e.target.value.replace(/[^-0-9.]/g, '');
                    state[side][index].value = parseFloat(clean) || 0;
                    render();
                };
                el.appendChild(input);
                container.appendChild(el);
            });
        }

        function calculateWeight(arr) { 
            return arr.reduce((acc, i) => acc + (i.type === 'x' ? i.value * state.xValue : i.value), 0); 
        }

        function formatEquation(arr) {
            if (arr.length === 0) return '0';
            let xT = 0, nT = 0;
            arr.forEach(i => i.type === 'x' ? xT += i.value : nT += i.value);
            let parts = [];
            if (xT !== 0) {
                if (xT === 1) parts.push('x');
                else if (xT === -1) parts.push('-x');
                else parts.push(smartFormat(xT) + 'x');
            }
            if (nT !== 0) {
                if (parts.length > 0) {
                    parts.push(nT > 0 ? '+ ' + smartFormat(nT) : '- ' + smartFormat(Math.abs(nT)));
                } else {
                    parts.push(smartFormat(nT));
                }
            }
            return parts.length > 0 ? parts.join(' ') : '0';
        }

        function resetScale() { state.left = []; state.right = []; render(); }
        valXInput.oninput = render;
        render();
    </script>
</body>
</html>
